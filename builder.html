<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="form-container">

<h2>Resume Builder</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="role" placeholder="Role">

<input type="email" id="email" placeholder="Email">

<input type="text" id="phone" placeholder="Phone">

<input type="text" id="linkedin" placeholder="LinkedIn URL">

<textarea id="summary" placeholder="Summary"></textarea>

<textarea id="education" placeholder="Education"></textarea>

<textarea id="skills" placeholder="Skills (comma separated)"></textarea>

<textarea id="projects" placeholder="Projects (one per line)"></textarea>

<textarea id="certifications" placeholder="Certifications"></textarea>

<textarea id="hobbies" placeholder="Hobbies"></textarea>

<textarea id="extra" placeholder="Extracurricular Activities"></textarea>

<button onclick="generateResume()">
Generate Resume
</button>

</div>

<script src="js/script.js"></script>

</body>
</html>
