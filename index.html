<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder Pro</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">

<div class="form-section">

<h2>Resume Builder</h2>

<div class="input-group">
<label>Profile Photo</label>
<input type="file" id="photo">
</div>

<div class="input-group">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="input-group">
<label>Professional Summary</label>
<textarea id="summary"></textarea>
</div>

<div class="input-group">
<label>Education</label>
<textarea id="education"></textarea>
</div>

<div class="input-group">
<label>Skills</label>
<textarea id="skills"></textarea>
</div>

<div class="input-group">
<label>Projects</label>
<textarea id="projects"></textarea>
</div>

<div class="input-group">
<label>Certifications</label>
<textarea id="certifications"></textarea>
</div>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="resume" id="resume">

<div class="header">
<img id="previewPhoto" class="profile-pic"
src="https://via.placeholder.com/120">

<h1 id="previewName">Your Name</h1>

<p id="previewEmail">email@example.com</p>

<p id="previewPhone">9876543210</p>
</div>

<div class="section">
<h3>Professional Summary</h3>
<p id="previewSummary"></p>
</div>

<div class="section">
<h3>Education</h3>
<p id="previewEducation"></p>
</div>

<div class="section">
<h3>Skills</h3>
<p id="previewSkills"></p>
</div>

<div class="section">
<h3>Projects</h3>
<p id="previewProjects"></p>
</div>

<div class="section">
<h3>Certifications</h3>
<p id="previewCertifications"></p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
