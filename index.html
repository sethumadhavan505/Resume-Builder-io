<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS Resume</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.resume{
max-width:850px;
margin:auto;
background:#fff;
padding:40px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
font-size:32px;
margin-bottom:5px;
}

.header p{
font-size:14px;
color:#555;
}

.section{
margin-top:20px;
}

.section-title{
font-size:18px;
font-weight:bold;
border-bottom:2px solid #000;
padding-bottom:5px;
margin-bottom:10px;
text-transform:uppercase;
}

ul{
padding-left:20px;
}

li{
margin-bottom:6px;
}

p{
line-height:1.6;
}
</style>
</head>
<body>

<div class="resume" id="resume">

<div class="header">
<h1 id="r-name">SETHU MADHAVAN P</h1>
<p id="r-role">B.Tech Student - Information Technology</p>
<p>
<span id="r-email">email@gmail.com</span> |
<span id="r-phone">9876543210</span> |
<span id="r-linkedin">linkedin.com/in/profile</span>
</p>
</div>

<div class="section">
<div class="section-title">Summary</div>
<p id="r-summary"></p>
</div>

<div class="section">
<div class="section-title">Education</div>
<p id="r-education"></p>
</div>

<div class="section">
<div class="section-title">Technical Skills</div>
<ul id="r-skills"></ul>
</div>

<div class="section">
<div class="section-title">Projects</div>
<ul id="r-projects"></ul>
</div>

<div class="section">
<div class="section-title">Certifications</div>
<ul id="r-certifications"></ul>
</div>

<div class="section">
<div class="section-title">Hobbies</div>
<ul id="r-hobbies"></ul>
</div>

<div class="section">
<div class="section-title">Extracurricular Activities</div>
<ul id="r-extra"></ul>
</div>

</div>

</body>
</html>
